services:
  backend:
    build: ./backend
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DB_PATH=/app/data/app.db
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - APP_URL=${APP_URL}
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
